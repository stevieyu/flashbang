<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="theme-color" content="#0a0a0f" />
    <link
      rel="search"
      type="application/opensearchdescription+xml"
      title="flashbang"
      href="/opensearch.xml"
    />
    <style>
      html {
        background: #0a0a0f;
      }
    </style>
  </head>
  <body>
    <script>
      (function () {
        var hasQuery =
          location.search.startsWith("?q=") || location.search.includes("&q=");

        var query = hasQuery && new URLSearchParams(location.search).get("q");

        if (
          "serviceWorker" in navigator &&
          query &&
          !navigator.serviceWorker.controller
        ) {
          navigator.serviceWorker.addEventListener(
            "message",
            function (e) {
              if (e.data && e.data.url) location.replace(e.data.url);
            },
            { once: true },
          );
          navigator.serviceWorker.addEventListener(
            "controllerchange",
            function () {
              navigator.serviceWorker.controller.postMessage({
                type: "redirect",
                query: query,
              });
            },
            { once: true },
          );
          navigator.serviceWorker.register("/sw.js");
        } else if ("serviceWorker" in navigator) {
          navigator.serviceWorker.register("/sw.js");
          Promise.all([
            fetch("/opensearch.xml").catch(function () {}),
            new Promise(function (resolve) {
              if (navigator.serviceWorker.controller) resolve();
              else
                navigator.serviceWorker.addEventListener(
                  "controllerchange",
                  resolve,
                  { once: true },
                );
            }),
          ]).then(function () {
            location.replace(location.href);
          });
        }
      })();
    </script>
  </body>
</html>
