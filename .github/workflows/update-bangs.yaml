name: Update Bangs

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: oven/setup-bun@v2

      - run: bun install

      - name: Fetch sources
        run: |
          mkdir -p data
          curl -sfo data/kagi.json https://raw.githubusercontent.com/kagisearch/bangs/main/data/bangs.json
          curl -sfo data/ddg.json https://duckduckgo.com/bang.js

      - name: Build
        run: bun run build

      - name: Check for changes
        id: diff
        run: |
          git add src/generated/
          if git diff --staged --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          PREV=$(git log -1 --pretty=%B)
          if [[ "$PREV" == "chore: update bangs" ]]; then
            git commit --amend -m "chore: update bangs"
            git push --force-with-lease
          else
            git commit -m "chore: update bangs"
            git push
          fi
